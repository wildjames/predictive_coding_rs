syntax = "proto3";

package train_model.v1;

message SubscribeEnergyRequest {
  // You could put options here later (e.g., frequency, fs). Left empty for now.
}

message Sample {
  uint32  step = 1;
  float  error = 2;
  float  energy = 3;
}

service TrainModelGrpc {
  // Server-streaming: client calls once, server streams samples forever.
  rpc SubscribeEnergyStream(SubscribeEnergyRequest) returns (stream Sample);
}
